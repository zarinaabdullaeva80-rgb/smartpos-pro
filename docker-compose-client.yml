# SmartPOS Pro - Docker Compose для клиентов
# Использование: docker-compose -f docker-compose-client.yml up -d

version: '3.8'

services:
  # PostgreSQL база данных
  db:
    image: postgres:14-alpine
    container_name: smartpos-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-smartpos_pro}
      POSTGRES_USER: ${DB_USER:-smartpos}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-SmartPOS2026!}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-smartpos}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis кэш
  redis:
    image: redis:7-alpine
    container_name: smartpos-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # SmartPOS Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: smartpos-server
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://${DB_USER:-smartpos}:${DB_PASSWORD:-SmartPOS2026!}@db:5432/${DB_NAME:-smartpos_pro}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      JWT_EXPIRES_IN: 7d
      LICENSE_KEY: ${LICENSE_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
      - backups:/app/backups

  # Nginx reverse proxy (опционально)
  nginx:
    image: nginx:alpine
    container_name: smartpos-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - server
    profiles:
      - with-nginx

volumes:
  postgres_data:
    name: smartpos-postgres-data
  redis_data:
    name: smartpos-redis-data
  uploads:
    name: smartpos-uploads
  logs:
    name: smartpos-logs
  backups:
    name: smartpos-backups

networks:
  default:
    name: smartpos-network
