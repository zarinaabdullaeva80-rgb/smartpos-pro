name: Build and Publish Electron App

on:
  push:
    branches: [main]
    paths:
      - 'client-accounting/**'
      - 'server/**'

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: client-accounting/package-lock.json

      - name: Get Version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./client-accounting/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version $VERSION"

      - name: Install Dependencies
        run: |
          cd client-accounting
          npm install

      - name: Build Vite
        shell: cmd
        run: |
          cd client-accounting
          npx vite build
          if %ERRORLEVEL% NEQ 0 (
            echo "Vite build had warnings but continuing..."
          )

      - name: Check dist exists
        shell: bash
        run: |
          if [ -d "client-accounting/dist" ]; then
            echo "dist folder exists, build succeeded"
            ls -la client-accounting/dist/
          else
            echo "ERROR: dist folder missing!"
            exit 1
          fi

      - name: Build Electron
        shell: cmd
        run: |
          cd client-accounting
          npx electron-builder --win --x64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: SmartPOS Pro v${{ steps.version.outputs.version }}
          body: |
            ## SmartPOS Pro v${{ steps.version.outputs.version }}
            Автоматическая сборка от ${{ github.sha }}
          files: |
            client-accounting/dist-electron/*.exe
            client-accounting/dist-electron/*.blockmap
            client-accounting/dist-electron/latest.yml
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
