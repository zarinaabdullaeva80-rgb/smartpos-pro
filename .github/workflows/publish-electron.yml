name: Build and Publish Electron App

on:
  push:
    branches: [main]
    paths:
      - 'client-accounting/**'
      - 'server/**'
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: client-accounting/package-lock.json

      - name: Get Version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./client-accounting/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version $VERSION"

      - name: Install Client Dependencies
        run: |
          cd client-accounting
          npm ci

      - name: Install Server Dependencies (for extraResources)
        run: |
          cd server
          npm ci --omit=dev

      - name: Build Vite
        run: |
          cd client-accounting
          npm run build

      - name: Check dist exists
        shell: bash
        run: |
          if [ -d "client-accounting/dist" ]; then
            echo "dist folder exists, build succeeded"
            ls -la client-accounting/dist/
          else
            echo "ERROR: dist folder missing!"
            exit 1
          fi

      - name: Build Electron Installer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd client-accounting
          npx electron-builder --win --x64 --publish never

      - name: Validate Artifacts
        shell: bash
        run: |
          cd client-accounting
          if ls dist-electron/*.exe 1>/dev/null 2>&1; then
            echo "EXE artifact found"
          else
            echo "ERROR: EXE artifact not found!"
            exit 1
          fi
          if [ -f "dist-electron/latest.yml" ]; then
            echo "latest.yml found"
          else
            echo "ERROR: latest.yml not found!"
            exit 1
          fi
          echo "All artifacts validated successfully."

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: SmartPOS Pro v${{ steps.version.outputs.version }}
          body: |
            ## SmartPOS Pro v${{ steps.version.outputs.version }}
            Автоматическая сборка от ${{ github.sha }}

            ### Новое в этой версии:
            - ✨ Стабилизация системы обновлений
            - 🔐 Улучшение многопользовательской безопасности
            - 🛠️ Оптимизация CI/CD пайплайна
          files: |
            client-accounting/dist-electron/*.exe
            client-accounting/dist-electron/*.blockmap
            client-accounting/dist-electron/latest.yml
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
