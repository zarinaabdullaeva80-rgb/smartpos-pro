<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="SmartPOS Pro - профессиональная система учёта и управления бизнесом" />
  <title>SmartPOS Pro</title>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#6366f1" />

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SmartPOS" />
  <link rel="apple-touch-icon" href="./icons/icon-192x192.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/icon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="./icons/icon-16x16.png" />
  <script type="module" crossorigin src="./assets/index-Ba9Hgn1d.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-gKDmPeSA.css">
</head>

<body>
  <script>
    // Self-healing: clear problematic stale license key
    const staleKey = '8D7C-3C89-06A3-19A1';
    if (localStorage.getItem('license_key') === staleKey) {
      console.warn('Stale license key detected, clearing...');
      localStorage.removeItem('license_key');
      localStorage.removeItem('license_info');
    }
  </script>
  <div id="root"></div>
  
  <!-- Inline загрузчик: показывается ДО загрузки React -->
  <div id="app-loader" style="
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    background: #0a0010; color: #f0e6ff; font-family: 'Inter', sans-serif;
    z-index: 99999;
  ">
    <h2 style="font-weight: 300; letter-spacing: 2px; margin-bottom: 24px; font-size: 22px;">SmartPOS Pro</h2>
    <div style="
      width: 40px; height: 40px;
      border: 3px solid rgba(255, 0, 128, 0.15);
      border-top: 3px solid #ff0080;
      border-radius: 50%;
      animation: loader-spin 1s linear infinite;
    "></div>
    <p style="margin-top: 20px; font-size: 14px; opacity: 0.6;">Загрузка системы...</p>
    <style>
      @keyframes loader-spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </div>
  <script>
    // Убираем загрузчик как только React отрисует контент
    const observer = new MutationObserver(() => {
      const root = document.getElementById('root');
      if (root && root.children.length > 0) {
        const loader = document.getElementById('app-loader');
        if (loader) {
          loader.style.opacity = '0';
          loader.style.transition = 'opacity 0.3s ease';
          setTimeout(() => loader.remove(), 300);
        }
        observer.disconnect();
      }
    });
    observer.observe(document.getElementById('root'), { childList: true });
    // Fallback: убрать загрузчик через 15 секунд в любом случае
    setTimeout(() => {
      const loader = document.getElementById('app-loader');
      if (loader) loader.remove();
    }, 15000);
  </script>


  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('✅ SW registered:', reg.scope))
          .catch(err => console.log('SW registration failed:', err));
      });
    }
  </script>
</body>

</html>
