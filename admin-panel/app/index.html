<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>SmartPOS Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=4.2.0">
</head>

<body>
    <!-- Connection Setup Screen -->
    <div id="setup-screen" class="setup-screen">
        <div class="setup-card">
            <div class="setup-logo">
                <img src="admin-logo.png" alt="SmartPOS Pro Admin"
                    style="width: 80px; height: 80px; object-fit: contain; border-radius: 16px;">
            </div>
            <h1>SmartPOS Pro Admin</h1>
            <p class="setup-subtitle">Панель администрирования</p>
            <div class="form-group">
                <label>Адрес сервера</label>
                <input type="text" id="server-url" placeholder="http://192.168.1.35:5000" value="http://192.168.1.35:5000">
            </div>
            <div class="form-group">
                <label>Логин</label>
                <input type="text" id="login-user" placeholder="Логин" value="">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="login-pass" placeholder="Пароль" value="">
            </div>
            <button id="btn-connect" class="btn btn-primary btn-lg" onclick="connectToServer()">
                🔗 Подключиться
            </button>
            <div id="connect-status" class="connect-status"></div>
        </div>
    </div>

    <!-- Main Admin Panel -->
    <div id="main-panel" class="main-panel" style="display:none">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <img src="admin-logo.png" alt="SmartPOS Pro Admin"
                        style="width: 32px; height: 32px; object-fit: contain; border-radius: 6px;">
                </div>
                <div>
                    <div class="sidebar-title">SmartPOS Admin</div>
                    <div class="sidebar-subtitle" id="server-label">—</div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-item active" data-tab="monitoring" onclick="switchTab('monitoring')">
                    <span class="nav-icon">📊</span> Мониторинг
                </button>
                <button class="nav-item" data-tab="users" onclick="switchTab('users')">
                    <span class="nav-icon">👥</span> Пользователи
                </button>
                <button class="nav-item" data-tab="sessions" onclick="switchTab('sessions')">
                    <span class="nav-icon">🌐</span> Сессии
                </button>
                <button class="nav-item" data-tab="backups" onclick="switchTab('backups')">
                    <span class="nav-icon">💾</span> Резервные копии
                </button>
                <button class="nav-item" data-tab="database" onclick="switchTab('database')">
                    <span class="nav-icon">🗄️</span> База данных
                </button>
                <button class="nav-item" data-tab="logs" onclick="switchTab('logs')">
                    <span class="nav-icon">📋</span> Логи сервера
                </button>
                <button class="nav-item" data-tab="licenses" onclick="switchTab('licenses')">
                    <span class="nav-icon">🔑</span> Лицензии
                </button>
                <button class="nav-item" data-tab="settings" onclick="switchTab('settings')">
                    <span class="nav-icon">⚙️</span> Настройки
                </button>
            </nav>
            <div class="sidebar-footer">
                <div style="display:flex;gap:8px;margin-bottom:8px">
                    <button class="btn btn-secondary btn-sm" id="btn-theme-toggle" onclick="toggleTheme()" style="flex:1">🌙 Тёмная</button>
                </div>
                <button class="btn btn-secondary btn-sm" onclick="disconnect()" style="width:100%">🔌 Отключиться</button>
            </div>
        </aside>

        <!-- Content Area -->
        <main class="content">
            <div class="content-header">
                <div style="display:flex;align-items:center;gap:12px">
                    <button class="btn btn-secondary sidebar-toggle" onclick="toggleSidebar()" title="Меню">☰</button>
                    <h1 id="page-title">📊 Мониторинг</h1>
                </div>
                <div class="header-actions">
                    <span id="last-update" class="text-muted"></span>
                    <div class="notif-bell" onclick="toggleAlertsPanel()" title="Уведомления">
                        🔔<span id="notif-count" class="notif-count" style="display:none">0</span>
                    </div>
                    <button class="btn btn-secondary" onclick="refreshData()">🔄 Обновить</button>
                </div>
            </div>
            <div id="content-area" class="content-body">
                <!-- Dynamic content -->
            </div>
        </main>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <script src="app.js?v=4.2.0"></script>
</body>

</html>
